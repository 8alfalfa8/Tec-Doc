name: Update Markdown TOC

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

jobs:
  update-toc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get changed Markdown files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: '**/*.md'

      - name: Run TOC updater
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          # 目次を生成する見出しレベル（デフォルト: 2 = "## 見出し"）
          # 1 = #, 2 = ##, 3 = ### を指定可能
          TOC_LEVEL: ${{ vars.TOC_LEVEL || '2' }}
          # 「目次に戻る」リンクのラベル（デフォルト: 🔙 目次に戻る）
          BACK_LABEL: ${{ vars.BACK_LABEL || '🔙 目次に戻る' }}
          # 除外するファイルパターン（カンマ区切り、例: "CHANGELOG.md,docs/api.md"）
          EXCLUDE_FILES: ${{ vars.EXCLUDE_FILES || '' }}
        run: |
          python .github/scripts/update_toc.py \
            --files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --level "$TOC_LEVEL" \
            --back-label "$BACK_LABEL" \
            --exclude "$EXCLUDE_FILES"

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: auto-update table of contents [skip ci]'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
