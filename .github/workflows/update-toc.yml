name: Update Markdown TOC

on:
  push:
    paths:
      - '**.md'
    branches:
      - main
      - master
      - develop  # developブランチを追加

permissions:
  contents: write

jobs:
  update-toc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 過去2件のコミットを取得（変更検出のため）
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Debug git info
        run: |
          echo "Current branch: $(git branch --show-current)"
          echo "Current commit: $(git log -1 --oneline)"
          echo "Previous commit: $(git log -2 --oneline | tail -1)"
          echo ""
          echo "Changed files (HEAD~1 vs HEAD):"
          git diff --name-only HEAD~1 HEAD || echo "No changes"
          echo ""
          echo "Changed files (using git diff with specific commit):"
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} || echo "No changes"
          echo ""
          echo "All MD files:"
          git ls-files '*.md'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update TOC for Markdown files
        env:
          HEADING_LEVEL: ${{ vars.HEADING_LEVEL }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: python .github/scripts/update_markdown_toc.py

      - name: Commit and push changes
        if: env.UPDATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.md'
          git diff --staged --quiet || git commit -m "docs: update markdown table of contents"
          git push