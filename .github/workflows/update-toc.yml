name: Update Markdown TOC

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

# Allow the workflow to push commits back to the repository
permissions:
  contents: write

jobs:
  update-toc:
    name: Add / refresh TOC in changed Markdown files
    runs-on: ubuntu-latest

    steps:
      # ── 1. checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch full history so we can diff against the base commit
          fetch-depth: 0

      # ── 2. set up Python ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. detect changed .md files ────────────────────────────────────────
      - name: Detect changed Markdown files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            # For a push event use the "before" SHA.
            # On the very first push to a branch before may be all-zeros.
            BASE="${{ github.event.before }}"
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              # New branch: compare with the previous commit on this push
              BASE="HEAD~1"
            fi
          fi

          # List added / modified .md files only (not deleted)
          FILES=$(git diff --name-only --diff-filter=AM "$BASE" HEAD -- '*.md' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed MD files: $FILES"

      # ── 4. run TOC script ──────────────────────────────────────────────────
      - name: Update TOC in changed files
        if: steps.changed.outputs.files != ''
        env:
          # Override the default heading level here, or pass via workflow_dispatch input.
          # 2 = ## (default), 3 = ### etc.
          TOC_LEVEL: ${{ vars.TOC_LEVEL || '2' }}
        run: |
          # Download the helper script from the repo itself
          # (the script lives at scripts/update_toc.py in your repository)
          python scripts/update_toc.py \
            --level "$TOC_LEVEL" \
            ${{ steps.changed.outputs.files }}

      # ── 5. commit if anything changed ──────────────────────────────────────
      - name: Commit updated files
        if: steps.changed.outputs.files != ''
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: auto-update Markdown TOC [skip ci]'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          # Only stage .md files to avoid accidental inclusions
          file_pattern: '**/*.md'