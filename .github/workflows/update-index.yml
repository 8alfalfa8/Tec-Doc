name: Update index.html from README

on:
  push:
    paths:
      - 'README.md'  # README.mdが更新された時のみ実行
  workflow_dispatch: # 手動実行も可能にする

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert README.md to index.html
        run: |
          # Pandocを使用してHTMLに変換
          # --standalone: 完全なHTMLファイルを作成
          # --mathjax: MathJaxを有効化
          # --metadata title: ブラウザのタブに表示されるタイトル
          pandoc README.md -s --mathjax \
          --metadata title="プロジェクト ドキュメント" \
          -o index.html

      - name: Inject Mermaid.js Script
        run: |
          # Mermaidを表示させるためのスクリプトを</body>直前に挿入
          SED_SCRIPT='<script type="module">import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";mermaid.initialize({startOnLoad:true});</script>'
          sed -i "s|</body>|$SED_SCRIPT</body>|" index.html

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update index.html from README.md" && git push)
