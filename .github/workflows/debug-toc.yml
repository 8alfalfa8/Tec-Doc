name: Debug TOC Update

on:
  push:
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Debug git info
        run: |
          echo "GitHub Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Previous SHA: ${{ github.event.before }}"
          echo ""
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD || echo "No changes detected"
          echo ""
          echo "All MD files:"
          git ls-files '*.md'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run TOC update
        run: |
          python .github/scripts/update_markdown_toc.py