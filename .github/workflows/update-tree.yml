name: Update Directory Tree

on:
  push:
    branches:
      - main  # 実際のブランチ名に合わせてください

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Directory Tree
        run: |
          sudo apt-get install -y tree
          echo "## Project Structure" > tree.txt
          echo '```' >> tree.txt
          # 日本語が化けないよう、-N オプションを推奨（環境による）
          tree -N -I '.git|.github' >> tree.txt
          echo '```' >> tree.txt

      - name: Update README
        run: |
          # タグを変数に定義（HTMLコメントとして消えるのを防ぐ）
          START_TAG=""
          END_TAG=""

          # READMEが存在しない場合の作成
          touch README.md

          # タグが存在しない場合は追記する
          if ! grep -q "$START_TAG" README.md; then
            echo -e "\n$START_TAG\n$END_TAG" >> README.md
          fi
          
          # 一時ファイルを使って安全に置換
          sed -n "1,/$START_TAG/p" README.md > new_readme.md
          cat tree.txt >> new_readme.md
          sed -n "/$END_TAG/,\$p" README.md >> new_readme.md
          
          mv new_readme.md README.md

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory tree [skip ci]"
