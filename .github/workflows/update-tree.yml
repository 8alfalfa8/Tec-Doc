name: Update Directory Tree with Links

on:
  push:
    branches:
      - main  # masterの場合はここを master に変更

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Linked Directory Tree
        run: |
          # tree.txtを初期化
          # echo '```' > tree.txt
          
          python3 -c "
          import os
          import urllib.parse

          def generate_tree(path, f, indent=''):
              try:
                  items = sorted(os.listdir(path))
              except PermissionError:
                  return
                  
              exclude = ['.git', '.github', 'tree.txt', 'new_readme.md']
              items = [i for i in items if i not in exclude]
              
              for i, item in enumerate(items):
                  full_path = os.path.join(path, item)
                  rel_path = os.path.relpath(full_path, '.')
                  url_path = urllib.parse.quote(rel_path)
                  
                  connector = '├── ' if i < len(items) - 1 else '└── '
                  
                  # 行末に半角スペース2つを追加
                  line_end = '  ' 
                  
                  if os.path.isdir(full_path):
                      # ディレクトリはリンクなし（名前のみ）
                      f.write(f'{indent}{connector}{item}/{line_end}\n')
                      generate_tree(full_path, f, indent + ('│   ' if i < len(items) - 1 else '    '))
                  else:
                      # ファイルのみリンクあり
                      f.write(f'{indent}{connector}[{item}]({url_path}){line_end}\n')

          with open('tree.txt', 'a', encoding='utf-8') as f:
              generate_tree('.', f)
          "
          # echo '```' >> tree.txt
          
          # デバッグ用出力
          cat tree.txt

      - name: Update README
        run: |
          S_TAG=$(echo "PCEtLSBTVEFSVF9UUkVFIC0tPg==" | base64 -d)
          E_TAG=$(echo "PCEtLSBFTkRfVFJFRSAtLT4=" | base64 -d)

          if ! grep -q "$S_TAG" README.md; then
            echo -e "\n$S_TAG\n$E_TAG" >> README.md
          fi
          
          awk -v s="$S_TAG" -v e="$E_TAG" -v r="$(cat tree.txt)" '
            BEGIN {p=1}
            $0 == s {print $0; print r; p=0}
            $0 == e {p=1}
            p && $0 != s && $0 != e {print $0}
          ' README.md > new_readme.md
          
          mv new_readme.md README.md

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory tree (files only linked) [skip ci]"
