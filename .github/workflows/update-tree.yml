name: Update Directory Tree

on:
  push:
    branches:
      - main  # 実際のブランチ名が master の場合は master に書き換えてください

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Directory Tree
        run: |
          sudo apt-get update && sudo apt-get install -y tree
          echo "## プロジェクト構成" > tree.txt
          echo '```' >> tree.txt
          # -N: 日本語文字化け防止
          tree -N -I '.git|.github' >> tree.txt
          echo '```' >> tree.txt

      - name: Update README
        run: |
          # タグをBase64でデコードして生成（シェルによる消失を防止）
          S_TAG=$(echo "PCEtLSBTVEFSVF9UUkVFIC0tPg==" | base64 -d)
          E_TAG=$(echo "PCEtLSBFTkRfVFJFRSAtLT4=" | base64 -d)

          touch README.md

          # タグが存在しない場合は末尾に追記
          if ! grep -q "$S_TAG" README.md; then
            echo -e "\n$S_TAG\n$E_TAG" >> README.md
          fi
          
          # awkを使用してタグの間に tree.txt を挿入
          awk -v s="$S_TAG" -v e="$E_TAG" -v r="$(cat tree.txt)" '
            BEGIN {p=1}
            $0 == s {print $0; print r; p=0}
            $0 == e {p=1}
            p && $0 != s && $0 != e {print $0}
          ' README.md > new_readme.md
          
          mv new_readme.md README.md

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update directory tree [skip ci]"
